services:
  - type: web
    name: marketmystr-mcp
    runtime: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GHL_PIT_TOKEN
        scope: run
        sync: false
      - key: GHL_LOCATION_ID
        scope: run
        sync: false
      - key: MCP_AUTH_TOKEN
        scope: run
        sync: false
      - key: PORT
        value: "3000"
        scope: run
